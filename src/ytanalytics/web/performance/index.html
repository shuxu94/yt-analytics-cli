<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Compare top and bottom YouTube videos with synchronized audience retention.">
  <title>Top and bottom video retention</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <p class="eyebrow">Shu's Lab · video performance</p>
        <h1>Top 5 and Bottom 5</h1>
      </div>
      <div class="period" id="period">Loading analytics…</div>
    </header>

    <div class="layout">
      <aside class="panel queue" id="queue" aria-label="Ranked videos"></aside>

      <div class="content">
        <section class="panel selected-header">
          <div>
            <p class="selected-label" id="selected-label"></p>
            <h2 id="selected-title">Loading dashboard…</h2>
          </div>
          <div class="metrics" id="metrics"></div>
        </section>

        <div class="workspace">
          <section class="panel" aria-label="YouTube video player">
            <div class="player-wrap">
              <div id="player"><div class="loading">Loading YouTube player…</div></div>
            </div>
            <div class="player-footer">
              <span class="status" id="status">Connecting player…</span>
              <span class="live" id="live">—</span>
            </div>
          </section>

          <section class="panel chart-panel" aria-label="Synchronized retention graph">
            <div class="chart-header">
              <h3>Audience retention</h3>
              <span class="current" id="current">0:00 · —</span>
            </div>
            <div class="chart-wrap">
              <svg id="chart" viewBox="0 0 760 390" role="img"
                   aria-label="Audience retention synchronized with video playback"></svg>
              <div class="tooltip" id="tooltip"></div>
            </div>
            <div class="controls">
              <button class="play" id="play" type="button" disabled>Play</button>
              <input class="timeline" id="timeline" type="range" min="0" step="0.05"
                     value="0" aria-label="Seek video">
              <output class="clock" id="clock">0:00 / 0:00</output>
            </div>
            <p class="hint">Choose any ranked video, then play normally or click its graph to seek.</p>
          </section>
        </div>
      </div>
    </div>
  </main>

  <div class="fatal-error" id="fatal-error" role="alert" hidden></div>
  <script src="/assets/app.js"></script>
</body>
</html>
